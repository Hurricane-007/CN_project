services:
  - type: web
    name: cn-video-streaming
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromValue: ${MONGODB_URI}
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
